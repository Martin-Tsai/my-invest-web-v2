<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InvestPro — 智慧投資戰情平台</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="InvestPro">
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="dark-mode">

    <main class="app-container">
        <header class="header">
            <h1 class="logo">Invest<span class="highlight">Pro</span></h1>
            <div class="search-container">
                <div class="search-input-group">
                    <span class="search-icon-css">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜尋代碼或名稱 (例如：2330, 台積電, AAPL)" autocomplete="off">
                    <button id="searchBtn">查詢</button>
                    <div id="searchSuggestions" class="suggestions-dropdown"></div>
                </div>
            </div>
            <div class="quick-links" id="default-links">
                <span class="link-label">🔥 熱門：</span>
                <button class="chip active" data-ticker="2330.TW">台積電</button>
                <button class="chip" data-ticker="0050.TW">0050</button>
                <button class="chip" data-ticker="2317.TW">鴻海</button>
                <button class="chip" data-ticker="AAPL">AAPL</button>
                <button class="chip" data-ticker="NVDA">NVDA</button>
            </div>
            <!-- Favorites List -->
            <div class="quick-links favorites-list" id="ui-favorites-list" style="display: none; margin-top: 8px;">
                <span class="link-label">⭐ 最愛：</span>
                <!-- dynamic -->
            </div>
        </header>

        <section class="dashboard">
            <!-- Price Header -->
            <div class="asset-info">
                <div>
                    <h2 class="asset-name" style="align-items: center; gap: 8px;">
                        <span id="ui-ticker">載入中...</span>
                        <button id="btn-favorite" class="favorite-btn" title="加入/移除最愛" style="display: none;">☆</button>
                    </h2>
                    <p class="asset-price">
                        <span id="ui-currency" class="currency-symbol"></span><span id="ui-price">---</span>
                        <span id="ui-change" class="change positive">---</span>
                    </p>
                </div>
                <div class="composite-score-box" id="ui-score-box">
                    <span class="score-label" style="display: flex; align-items: center; justify-content: center;">綜合分數<i class="info-icon" data-tooltip="範圍約 -7 至 +7 分。整合技術面(均線排列、KD 交叉、RSI 強弱)等綜合量化評分。正數偏多，負數偏空，絕對值越大訊號越強。">i</i></span>
                    <span class="score-value" id="ui-composite-score">--</span>
                </div>
            </div>

            <!-- ══════════ STRATEGY WAR ROOM ══════════ -->
            <div class="section-title" style="display: flex; align-items: center;">
                🎯 策略戰情室
                <i class="info-icon" data-tooltip="依據葛蘭碧八大法則搭配 KD/RSI ，透過演算法產生的當前市況與買賣策略建議。此為歷史回測經驗法則，股市有風險，請獨立思考後再採取行動。">i</i>
            </div>

            <!-- Granville Signal Banner -->
            <div class="granville-banner" id="ui-granville-banner">
                <div class="granville-left">
                    <span class="granville-code" id="ui-granville-code">--</span>
                    <span class="granville-label" id="ui-granville-label">---</span>
                </div>
                <div class="granville-right">
                    <span class="granville-state-label">現在狀態</span>
                    <span class="granville-state" id="ui-overall-state">---</span>
                </div>
            </div>

            <!-- Action Cards Grid -->
            <div class="strategy-grid">
                <div class="strategy-card" id="card-action">
                    <div class="strategy-card-header">
                        <span class="strategy-icon">🎬</span>
                        <span>適合動作</span>
                    </div>
                    <p class="strategy-card-body" id="ui-action">---</p>
                </div>
                <div class="strategy-card" id="card-timing">
                    <div class="strategy-card-header">
                        <span class="strategy-icon">⏰</span>
                        <span>進場時機</span>
                    </div>
                    <p class="strategy-card-body" id="ui-timing">---</p>
                </div>
                <div class="strategy-card card-full" id="card-holder">
                    <div class="strategy-card-header">
                        <span class="strategy-icon">🤝</span>
                        <span>持有者動作</span>
                    </div>
                    <p class="strategy-card-body" id="ui-holder">---</p>
                </div>
            </div>

            <!-- Support / Resistance Bar -->
            <div class="sr-bar">
                <div class="sr-item support">
                    <span class="sr-label">📉 支撐位</span>
                    <span class="sr-value" id="ui-support">---</span>
                    <span class="sr-dist" id="ui-support-dist">---</span>
                </div>
                <div class="sr-divider">
                    <span class="sr-price" id="ui-sr-price">---</span>
                </div>
                <div class="sr-item resistance">
                    <span class="sr-label">📈 壓力位</span>
                    <span class="sr-value" id="ui-resistance">---</span>
                    <span class="sr-dist" id="ui-resistance-dist">---</span>
                </div>
            </div>

            <!-- Risk Warnings -->
            <div class="risk-section" id="ui-risk-section">
                <div class="section-title" style="display: flex; align-items: center;">
                    ⚠️ 風險提醒
                    <i class="info-icon" data-tooltip="系統會掃描當前 K 線與指標是否出現高危險訊號（如：死亡交叉、跌破極限支撐等），綠色代表目前無明顯風險。">i</i>
                </div>
                <ul class="risk-list" id="ui-risks"></ul>
            </div>

            <!-- Judgment Basis -->
            <div class="reasons-section">
                <div class="section-title">📋 判斷依據</div>
                <ul class="reasons-list" id="ui-reasons"></ul>
            </div>

            <!-- ══════════ INDICATOR GRID ══════════ -->
            <div class="section-title" style="display: flex; align-items: center;">
                📊 技術指標總覽
                <i class="info-icon" data-tooltip="展示各大關鍵均線 (MA)、籌碼動能與 KD/RSI 指標狀態。上方「綜合分數」與「戰情室建議」皆是基於此區塊的每日原始數值推導計算而得。">i</i>
            </div>
            <div class="indicator-grid" id="ui-indicator-grid"></div>

            <!-- ══════════ CHARTS ══════════ -->
            <div class="tabs-container">
                <ul class="tabs">
                    <li class="tab active" data-tab="tab-main">主圖 (K線/MA)</li>
                    <li class="tab" data-tab="tab-indicators">技術指標 (KD/RSI)</li>
                </ul>
            </div>
            <div class="chart-wrapper">
                <div id="tab-main" class="tab-content active">
                    <div id="mainChart" class="chart-box"></div>
                </div>
                <div id="tab-indicators" class="tab-content">
                    <div id="kdChart" class="chart-box indicator"></div>
                    <div id="rsiChart" class="chart-box indicator"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
